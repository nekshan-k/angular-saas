<div
  *ngIf="isOpen"
  class="fixed inset-0 z-50 bg-black/40 flex items-center justify-center p-4"
  (click)="onBackdropClick($event)"
>
  <div class="relative w-full max-w-2xl rounded-xl border border-default-stroke bg-white shadow-sm p-6">
    <button
      type="button"
      class="absolute top-3 right-3 h-12 w-12 rounded-full hover:bg-gray-2 text-body-2"
      (click)="onClose()"
    >
      ×
    </button>
    <ng-content></ng-content>
  </div>
</div>
