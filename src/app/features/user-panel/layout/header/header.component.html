<header class="sticky top-0 z-30 h-16 bg-white border-b border-default-stroke flex items-center justify-between px-6">
  <div class="flex items-center gap-3">
    <div class="flex flex-col leading-none">
      <div class="text-lg font-bold text-label-1">WealthMax</div>
      <div class="text-xs text-body-2">Financial Advisers</div>
    </div>
  </div>

  <div class="flex items-center gap-2">
    <div class="relative">
      <button
        type="button"
        (click)="toggleThemePanel()"
        class="h-9 px-3 rounded-lg border border-default-stroke hover:bg-gray-2 flex items-center justify-center text-body-2 text-sm font-medium"
      >
        Theme
      </button>

      <div *ngIf="isThemePanelOpen" class="absolute right-0 mt-2 w-64 bg-white border border-default-stroke rounded-lg shadow-sm p-3 z-40">
        <div class="space-y-3">
          <div>
            <div class="text-xs text-body-2 mb-1">Primary Color</div>
            <div class="flex items-center gap-2">
              <input
                type="color"
                class="h-8 w-10 rounded border border-default-stroke bg-transparent"
                [value]="primaryColor()"
                (input)="onPrimaryColorChange($event)"
              />
              <input
                type="text"
                class="h-8 flex-1 rounded border border-default-stroke px-2 text-sm text-body-2"
                [value]="primaryColor()"
                (change)="onPrimaryColorChange($event)"
              />
            </div>
          </div>

          <div>
            <div class="text-xs text-body-2 mb-1">Secondary Color</div>
            <div class="flex items-center gap-2">
              <input
                type="color"
                class="h-8 w-10 rounded border border-default-stroke bg-transparent"
                [value]="secondaryColor()"
                (input)="onSecondaryColorChange($event)"
              />
              <input
                type="text"
                class="h-8 flex-1 rounded border border-default-stroke px-2 text-sm text-body-2"
                [value]="secondaryColor()"
                (change)="onSecondaryColorChange($event)"
              />
            </div>
          </div>
        </div>
      </div>
    </div>

    <button type="button" class="h-9 w-9 rounded-full hover:bg-gray-2 flex items-center justify-center text-body-2">
      <app-icon [icon]="bellIcon" [size]="18" color="currentColor"></app-icon>
    </button>
    <button type="button" class="h-9 w-9 rounded-full hover:bg-gray-2 flex items-center justify-center text-body-2">
      <app-icon [icon]="appsIcon" [size]="18" color="currentColor"></app-icon>
    </button>
    <button
      type="button"
      class="ml-2 h-9 w-9 rounded-full bg-gray-2 border border-default-stroke flex items-center justify-center text-label-1 text-sm font-semibold"
    >
      A
    </button>
  </div>
</header>
