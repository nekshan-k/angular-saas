<aside
  class="relative h-full bg-white border-r border-default-stroke overflow-visible shrink-0 transition-[width] duration-300 ease-in-out"
  [class.w-64]="!collapsed"
  [class.w-20]="collapsed"
>
  <button
    type="button"
    (click)="toggleCollapse.emit()"
    class="absolute top-6 right-0 translate-x-full h-10 w-6 bg-primary-2 rounded-r-lg flex items-center justify-center z-20 transition-all duration-300"
  >
    <app-icon [icon]="collapsed ? chevronRightIcon : chevronLeftIcon" [size]="16" color="white"></app-icon>
  </button>

  <div class="h-full overflow-y-auto">
  <nav class="py-3">
    <ul class="px-3">
      <ng-container *ngFor="let entry of entries">
        <li *ngIf="entry.type === 'divider'" class="my-2">
          <div class="h-px bg-gray-2"></div>
        </li>

        <li *ngIf="entry.type === 'item'">
          <button
            type="button"
            (click)="setActive(entry)"
            class="w-full flex items-center py-3 rounded-lg text-gray-1 hover:bg-gray-2 hover:text-primary-2 transition-all duration-200"
            [class.gap-3]="!collapsed"
            [class.gap-0]="collapsed"
            [class.px-3]="!collapsed"
            [class.px-2]="collapsed"
            [class.bg-primary-hover]="isActive(entry)"
            [class.text-primary-2]="isActive(entry)"
            [class.justify-center]="collapsed"
            [attr.title]="collapsed ? entry.label : null"
          >
            <app-icon [icon]="entry.icon" [size]="18" color="currentColor"></app-icon>

            <span
              class="text-sm font-medium text-left whitespace-nowrap overflow-hidden transition-all duration-200"
              [class.flex-1]="!collapsed"
              [class.max-w-[160px]]="!collapsed"
              [class.opacity-100]="!collapsed"
              [class.max-w-0]="collapsed"
              [class.opacity-0]="collapsed"
            >
              {{ entry.label }}
            </span>

            <span
              class="text-xs px-2 py-0.5 rounded-full bg-gray-2 text-gray-1 transition-all duration-200 whitespace-nowrap overflow-hidden"
              [class.max-w-20]="!collapsed && entry.badge"
              [class.opacity-100]="!collapsed && entry.badge"
              [class.max-w-0]="collapsed || !entry.badge"
              [class.opacity-0]="collapsed || !entry.badge"
            >
              {{ entry.badge }}
            </span>
          </button>
        </li>
      </ng-container>
    </ul>
  </nav>
  </div>
</aside>
